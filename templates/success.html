<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - SkillStamp</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .success-container {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #4B0082;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 500px;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            color: #28a745;
        }

        .success-container h2 {
            color: #28a745;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .success-message {
            color: #e0e0e0;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-container .btn {
            padding: 12px 30px;
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        <h2>Success!</h2>
        <p class="success-message">{{ message or 'Your action has been completed successfully!' }}</p>

        <div class="btn-container">
            {% if link_url %}
                <a href="{{ link_url }}" class="btn">{{ link_text or 'Continue' }}</a>
            {% else %}
                <a href="/" class="btn">Back to Home</a>
            {% endif %}
            <a href="/dashboard" class="btn btn-secondary">Go to Dashboard</a>
        </div>
    </div>

    <footer>
        &copy; 2026 SkillStamp | All Rights Reserved
    </footer>
</body>
</html>
