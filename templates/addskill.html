<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Skill | SkillStamp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #4B0082;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            color: #999;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
        }
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        button,
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
        .btn-cancel {
            background-color: #ddd;
            color: #333;
        }
        .btn-cancel:hover {
            background-color: #ccc;
        }
        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>➕ Add Skill</h1>
            <p>Add a new skill to your profile</p>
        </div>

        <form method="POST" action="/addskill">
            {% if error %}
                <div style="background: #fdecea; color: #b42318; border: 1px solid #f9d3d0; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px;">
                    {{ error }}
                </div>
            {% endif %}

            <div class="form-group">
                <label for="skill_name">Skill Name <span class="required">*</span></label>
                <input type="text" id="skill_name" name="skill_name" placeholder="e.g., Python, Project Management, Data Analysis" required>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" placeholder="e.g., Software, Design, Database" value="General">
            </div>

            <div class="form-group">
                <label for="proficiency_level">Proficiency Level <span class="required">*</span></label>
                <select id="proficiency_level" name="proficiency_level" required>
                    <option value="">Select proficiency level...</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                    <option value="expert">Expert</option>
                </select>
            </div>

            <div class="form-group">
                <label for="years_of_experience">Years of Experience</label>
                <input type="number" id="years_of_experience" name="years_of_experience" min="0" max="60" value="0" placeholder="e.g., 2">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Add Skill</button>
                <a href="/myskills" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
